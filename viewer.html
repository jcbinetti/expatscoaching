<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Просмотр · Ansicht</title>
<link rel="stylesheet" href="assets/fonts/fonts.css">
<style>
  :root{--bg:#2c3a42;--ink:#35454E;--muted:#9fb0b8;--accent:#6E9DB5;--accent-d:#517E96;
    --sans:'Manrope',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:#fff;line-height:1.5;-webkit-user-select:none;user-select:none;display:flex;flex-direction:column;overflow:hidden}
  .de{display:none} html[lang="de"] .ru{display:none} html[lang="de"] .de{display:revert}
  header{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:10px clamp(12px,3vw,26px);background:rgba(34,45,52,.96);border-bottom:1px solid rgba(255,255,255,.08)}
  .hbtn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:#fff;font-size:.84rem;font-weight:600;border:1.5px solid rgba(255,255,255,.5);border-radius:999px;padding:7px 15px;background:none;cursor:pointer;white-space:nowrap;font-family:var(--sans)}
  .hbtn:hover{background:rgba(255,255,255,.12)}
  .ttl{flex:1;min-width:0;font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Bühne: eine Folie, zentriert */
  .stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;padding:14px;min-height:0}
  .stage canvas{max-width:100%;max-height:100%;width:auto;height:auto;background:#fff;box-shadow:0 8px 30px rgba(0,0,0,.45);display:block}
  .arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:52px;height:52px;border-radius:50%;border:0;cursor:pointer;font-size:1.5rem;color:#fff;background:rgba(20,28,33,.55);transition:.15s;display:flex;align-items:center;justify-content:center}
  .arrow:hover{background:rgba(20,28,33,.85)}
  .arrow:disabled{opacity:.25;cursor:default}
  #prev{left:clamp(8px,2vw,22px)} #next{right:clamp(8px,2vw,22px)}
  /* Fußleiste */
  footer{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:14px;padding:9px 14px;background:rgba(34,45,52,.96);border-top:1px solid rgba(255,255,255,.08);font-size:.88rem}
  .pg{min-width:70px;text-align:center;color:var(--muted);font-weight:700}
  .load{color:var(--muted);text-align:center;font-size:.95rem}
  .err{background:#fbeaea;color:#c0392b;border:1px solid #f1c6c6;border-radius:10px;padding:14px 16px;max-width:560px;text-align:center}
  :fullscreen body, body:fullscreen{background:#1d262c}
  @media print { body{display:none !important} }
  @media(max-width:640px){ .arrow{width:42px;height:42px} .ttl{font-size:.85rem} }
</style>
</head>
<body oncontextmenu="return false">
<header>
  <a class="hbtn" href="unterlagen.html" id="backBtn">← <span class="ru">Мои материалы</span><span class="de">Meine Materialien</span></a>
  <div class="ttl" id="ttl"></div>
  <button class="hbtn" id="fsBtn" title="Vollbild / Во весь экран">⛶ <span class="ru">Во весь экран</span><span class="de">Vollbild</span></button>
</header>

<div class="stage" id="stage">
  <button class="arrow" id="prev" aria-label="назад">‹</button>
  <div class="load" id="load"><span class="ru">Загружаю документ…</span><span class="de">Dokument wird geladen…</span></div>
  <button class="arrow" id="next" aria-label="вперёд">›</button>
</div>

<footer>
  <div class="pg" id="pg">…</div>
</footer>

<script type="module">
  import * as pdfjsLib from './assets/pdfjs/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc = './assets/pdfjs/pdf.worker.min.mjs';

  var L=(localStorage.getItem('alc_lang')==='de')?'de':'ru';
  document.documentElement.lang=L;
  function T(ru,de){return L==='de'?de:ru;}

  var params=new URLSearchParams(location.search);
  var fname=params.get('f')||'';
  document.getElementById('ttl').textContent=fname.replace(/\.[^.]+$/,'').replace(/^(\d{1,2})[\s._-]+/,'$1 · ').replace(/_/g,' ');
  document.title=fname;

  var pw='';try{pw=sessionStorage.getItem('kurs_pw')||'';}catch(e){}
  var stage=document.getElementById('stage'),loadEl=document.getElementById('load'),pgEl=document.getElementById('pg');
  var btnPrev=document.getElementById('prev'),btnNext=document.getElementById('next');
  function showErr(m){if(loadEl)loadEl.remove();var d=document.createElement('div');d.className='err';d.textContent=m;stage.insertBefore(d,btnNext);}

  var pdfDoc=null,cur=1,total=0,wmText='expatscoaching.de',cache={},rendering=false;

  function renderPage(n){
    if(cache[n])return Promise.resolve(cache[n]);
    return pdfDoc.getPage(n).then(function(page){
      var vp=page.getViewport({scale:1});
      // Qualität: an Bildschirm anpassen (bis 2x devicePixelRatio, max ~2200px Breite)
      var target=Math.min(2200,Math.max(window.innerWidth,window.innerHeight)*Math.min(window.devicePixelRatio||1,2));
      var s=target/vp.width;
      var v2=page.getViewport({scale:s});
      var c=document.createElement('canvas');c.width=v2.width;c.height=v2.height;
      return page.render({canvasContext:c.getContext('2d'),viewport:v2}).promise.then(function(){
        var ctx=c.getContext('2d');
        ctx.save();ctx.globalAlpha=0.13;ctx.fillStyle='#35454E';
        ctx.font='bold '+Math.round(c.width/28)+'px Manrope, Arial, sans-serif';
        ctx.translate(c.width/2,c.height/2);ctx.rotate(-Math.PI/7);ctx.textAlign='center';
        ctx.fillText(wmText,0,-c.height/6);ctx.fillText(wmText,0,c.height/6);
        ctx.restore();
        cache[n]=c;return c;
      });
    });
  }
  function show(n){
    if(!pdfDoc||n<1||n>total||rendering)return;
    rendering=true;cur=n;
    pgEl.textContent=cur+' / '+total;
    btnPrev.disabled=(cur<=1);btnNext.disabled=(cur>=total);
    renderPage(n).then(function(c){
      var old=stage.querySelector('canvas');
      if(old)old.remove();
      if(loadEl){loadEl.remove();loadEl=null;}
      stage.insertBefore(c,btnNext);
      rendering=false;
      if(n<total)renderPage(n+1); // nächste Folie vorladen
    }).catch(function(){rendering=false;});
  }

  if(!fname){showErr(T('Файл не указан.','Keine Datei angegeben.'));}
  else if(!pw){location.href='unterlagen.html';}
  else{
    fetch('unterlagen.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'list',password:pw})})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(j){ if(j&&j.wm)wmText=j.wm+' · expatscoaching.de'; return fetch('unterlagen.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'view',password:pw,file:fname})}); })
      .then(function(r){ if(!r.ok)throw new Error(r.status===401?T('Код недействителен — войдите заново.','Code ungültig — bitte neu anmelden.'):T('Файл недоступен.','Datei nicht verfügbar.')); return r.arrayBuffer(); })
      .then(function(buf){ return pdfjsLib.getDocument({data:buf}).promise; })
      .then(function(pdf){
        pdfDoc=pdf;total=pdf.numPages;
        try{localStorage.setItem('viewed_'+fname,'1');}catch(e){}
        show(1);
      })
      .catch(function(e){showErr(e.message||T('Ошибка загрузки.','Ladefehler.'));});
  }

  // Blättern: Buttons, Tastatur, Wischen
  btnPrev.addEventListener('click',function(){show(cur-1);});
  btnNext.addEventListener('click',function(){show(cur+1);});
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();show(cur+1);}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();show(cur-1);}
    else if(e.key.toLowerCase()==='f'){toggleFs();}
    else if((e.ctrlKey||e.metaKey)&&['p','s','c'].indexOf(e.key.toLowerCase())>-1){e.preventDefault();}
  });
  var tx=null;
  stage.addEventListener('touchstart',function(e){tx=e.changedTouches[0].clientX;},{passive:true});
  stage.addEventListener('touchend',function(e){
    if(tx===null)return;
    var dx=e.changedTouches[0].clientX-tx;tx=null;
    if(Math.abs(dx)>45){if(dx<0)show(cur+1);else show(cur-1);}
  },{passive:true});

  // Vollbild
  var fsBtn=document.getElementById('fsBtn');
  function toggleFs(){
    if(document.fullscreenElement){document.exitFullscreen();}
    else{document.documentElement.requestFullscreen().catch(function(){});}
  }
  fsBtn.addEventListener('click',toggleFs);
</script>
</body>
</html>
