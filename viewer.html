<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Просмотр · Ansicht</title>
<link rel="stylesheet" href="assets/fonts/fonts.css">
<style>
  :root{--bg:#2c3a42;--ink:#35454E;--muted:#9fb0b8;--accent:#6E9DB5;--accent-d:#517E96;--line:#DCE3E5;
    --sans:'Manrope',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:#fff;line-height:1.5;-webkit-user-select:none;user-select:none}
  .de{display:none} html[lang="de"] .ru{display:none} html[lang="de"] .de{display:revert}
  header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:10px clamp(14px,3vw,28px);background:rgba(34,45,52,.96);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.08)}
  .back{text-decoration:none;color:#fff;font-size:.84rem;border:1.5px solid rgba(255,255,255,.5);border-radius:999px;padding:7px 15px;white-space:nowrap}
  .ttl{flex:1;min-width:0;font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pg{font-size:.82rem;color:var(--muted);white-space:nowrap}
  main{max-width:980px;margin:0 auto;padding:18px 10px 60px}
  .page{position:relative;margin:0 auto 16px;box-shadow:0 8px 30px rgba(0,0,0,.4);background:#fff}
  .page canvas{display:block;width:100%;height:auto}
  .load{color:var(--muted);text-align:center;padding:60px 20px;font-size:.95rem}
  .err{background:#fbeaea;color:#c0392b;border:1px solid #f1c6c6;border-radius:10px;padding:14px 16px;max-width:560px;margin:40px auto;text-align:center}
  @media print { body{display:none !important} }
</style>
</head>
<body oncontextmenu="return false">
<header>
  <a class="back" href="unterlagen.html"><span class="ru">← Материалы</span><span class="de">← Materialien</span></a>
  <div class="ttl" id="ttl"></div>
  <div class="pg" id="pg"></div>
</header>
<main id="main"><div class="load" id="load"><span class="ru">Загружаю документ…</span><span class="de">Dokument wird geladen…</span></div></main>

<script type="module">
  import * as pdfjsLib from './assets/pdfjs/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc = './assets/pdfjs/pdf.worker.min.mjs';

  var L=(localStorage.getItem('alc_lang')==='de')?'de':'ru';
  document.documentElement.lang=L;
  function T(ru,de){return L==='de'?de:ru;}

  var params=new URLSearchParams(location.search);
  var fname=params.get('f')||'';
  document.getElementById('ttl').textContent=fname.replace(/\.[^.]+$/,'');
  document.title=fname;

  var pw='';try{pw=sessionStorage.getItem('kurs_pw')||'';}catch(e){}
  var main=document.getElementById('main'),loadEl=document.getElementById('load');
  function showErr(m){loadEl.remove();var d=document.createElement('div');d.className='err';d.textContent=m;main.appendChild(d);}

  if(!fname){showErr(T('Файл не указан.','Keine Datei angegeben.'));}
  else if(!pw){location.href='unterlagen.html';}
  else{
    // Wasserzeichen-Text vom Server (personalisiert bei Einzel-Code)
    var wmText='expatscoaching.de';
    fetch('unterlagen.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'list',password:pw})})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(j){ if(j&&j.wm)wmText=j.wm+' · expatscoaching.de'; return fetch('unterlagen.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'view',password:pw,file:fname})}); })
      .then(function(r){ if(!r.ok)throw new Error(r.status===401?T('Пароль недействителен — войдите заново.','Passwort ungültig — bitte neu anmelden.'):T('Файл недоступен.','Datei nicht verfügbar.')); return r.arrayBuffer(); })
      .then(function(buf){ return pdfjsLib.getDocument({data:buf}).promise; })
      .then(async function(pdf){
        loadEl.remove();
        document.getElementById('pg').textContent=pdf.numPages+' '+T('стр.','S.');
        var scale=Math.min(2,(Math.max(window.devicePixelRatio||1,1.5)));
        for(var n=1;n<=pdf.numPages;n++){
          var page=await pdf.getPage(n);
          var vp=page.getViewport({scale:1});
          var w=Math.min(940,main.clientWidth-4);
          var s=(w/vp.width)*scale;
          var v2=page.getViewport({scale:s});
          var holder=document.createElement('div');holder.className='page';holder.style.maxWidth=w+'px';
          var c=document.createElement('canvas');c.width=v2.width;c.height=v2.height;
          holder.appendChild(c);main.appendChild(holder);
          await page.render({canvasContext:c.getContext('2d'),viewport:v2}).promise;
          // Wasserzeichen direkt in den Canvas brennen
          var ctx=c.getContext('2d');
          ctx.save();
          ctx.globalAlpha=0.13;
          ctx.fillStyle='#35454E';
          ctx.font='bold '+Math.round(c.width/28)+'px Manrope, Arial, sans-serif';
          ctx.translate(c.width/2,c.height/2);
          ctx.rotate(-Math.PI/7);
          ctx.textAlign='center';
          ctx.fillText(wmText,0,-c.height/6);
          ctx.fillText(wmText,0,c.height/6);
          ctx.restore();
        }
      })
      .catch(function(e){showErr(e.message||T('Ошибка загрузки.','Ladefehler.'));});
  }

  // Kopieren/Drucken erschweren (Screenshots sind prinzipiell nicht verhinderbar)
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&['p','s','c'].indexOf(e.key.toLowerCase())>-1){e.preventDefault();}
  });
</script>
</body>
</html>
